body:
  text: 西天譯經三藏朝散大夫試鴻臚卿傳教大師臣法天奉詔譯稽首歸依正等覺能度無邊大苦海恆以甘露潤群生令得涅槃我頂禮稽首歸依正法藏能止無邊苦惱因顯示過失利衆生令獲寂靜我頂禮稽首歸依大苾芻能與世間為福聚發行勤修安樂因善斷輪回我頂禮愛別離最苦憂火鎮燒然若欲自安心端居作觀想譬如群鳥獸暫聚各分飛生死人亦然云何懷憂苦只自一有死衆人皆長生別離痛不任親姻須啼泣三界大輪回無有免斯者平等受無常云何懷憂苦若人生貪愛孰知貪火燒如彼犛牛身愛尾遭人殺世人多迷醉欲逃嶮惡道設盡方便心不能免離苦如彼野麞鹿常被師子逐究竟不能逃云何懷憂苦大地及天上三界與四生未曾得見聞不受無常者亦如山野火焚燒草木時不擇花果林俱時成灰燼愚癡諸衆生顛倒生妄想身繫無常繩無人能可解色界梵世中禪味為安樂亦如樹臨河不久風水壞百億轉輪王千萬天帝釋念念即無常如風吹燈焰過去大神仙五通心自在往復騰空行猶被無常取金剛堅固身尚自示寂滅凡識如芭蕉云何欲久住大地妙高山及以四大海劫壞亦歸空何況衆生趣龍居深海裏眷屬常圍繞金翅鳥能食別離苦亦爾或人往他界欲避於無常如入摩竭魚口中求安隱如是欲色界及彼非非想未有於一物不被無常吞唯有正等覺是真依仗處信受汝諦聽能解諸憂惱如是我聞一時佛在舍衛國祇樹給孤獨園爾時世尊告苾芻言衆生無數輪回無邊如蟻循環無有窮盡衆生貪愛無明障閉如陷泥中而不能出過去有情輪回往復數不能知苾芻所有大地之土都聚一處和為泥丸大小如豆數彼衆生無始劫來所生父母子孫每一人下一泥丸如是泥丸下盡父母子孫數不能盡苾芻如是無邊輪回衆生貪愛無明顛倒陷愛欲泥中生死輪回不知其數是故令汝學斷輪回佛言苾芻如是補特伽羅輪回衆生以骨作聚如妙高山不壞不爛如是無學聲聞證四聖諦了知此苦真實為苦苦滅證苦聖諦彼補特伽羅見此尸骨不知是苦亦不能滅三界煩惱若滅三界煩惱證須陀洹不空法決定得菩提由於七生天人之中作斷輪回除滅煩惱七生滿已聖諦現前正見智慧滅盡餘惑到涅槃寂靜彼補特伽羅方得解脫輪回之苦佛言苾芻如人眷屬互相愛樂以貪愛故廣造諸業生死輪回譬如野象陷泥坑中無有出期又彼眷屬如恆河沙父母養育皆如親子至後世中隨其報應各各不同或為僕從或為冤家互相瞋恨欺辱打罵或為傍類互相食噉或被殺害如是種種諸趣輪回如七仙衆或聚或散亦如天雨生其水漚或生或滅如是衆生愚癡大力迷惑顛倒不了輪回於其眷屬妄生樂想造種種業未有須臾得清淨住又彼有情無始輪回入地獄中所飲銅汁過大海水如彼豬狗食不淨物如妙高山又彼有情生死別離愛戀泣淚亦如海水又彼有情更相殺害積聚彼頭過梵天界蟲食膿血亦如海水又餓鬼趣以宿慳貪受飢渴苦如遇飲食即成煙焰鬼報滿已設生人中貧窮飢困種種苦惱説不能盡又彼有情以修福善生忉利天等境界殊勝恆受快樂貪愛熾盛如火燒乾草報壽盡時即墮惡趣譬如飛禽折其兩翼剎那落地受種種苦是故汝等學斷輪回速求解脫佛言苾芻譬如江河大地日月星辰須彌盧山及諸聚落世界未壞而得久住常在世間今此經典亦復如是世界未壞法亦久住於意云何為與一切有情止息輪回故苾芻聞已信受奉行
